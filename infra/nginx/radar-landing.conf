server {
    listen 80;
    server_name radar.marcoslozina.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name radar.marcoslozina.com;

    ssl_certificate /etc/letsencrypt/live/radar.marcoslozina.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radar.marcoslozina.com/privkey.pem;

    root /var/www/radar-landing;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self' https://cdn.tailwindcss.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
